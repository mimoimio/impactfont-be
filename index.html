<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator Client</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            box-sizing: border-box;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result-area {
            margin-top: 2rem;
            border: 2px dashed #ccc;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        img#meme-output {
            max-width: 100%;
            height: auto;
            display: none;
            /* Hidden until generated */
        }

        .loading {
            color: #666;
            display: none;
        }

        /* ... existing styles ... */

        /* New Drop Zone Styles */
        .drop-zone {
            border: 3px dashed #3498db;
            background-color: #f7f9fc;
            padding: 20px;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
            text-align: center;
            border-radius: 8px;
        }

        .drop-zone.dragover {
            border-color: #2ecc71;
            background-color: #e8f5e9;
        }

        .drop-zone.has-file {
            border-color: #007BFF;
            background-color: #e0f7fa;
        }
    </style>
</head>

<body>

    <h1>Meme Generator</h1>
    <div class="form-group">
        <label for="imageInput">1. Drag & Drop Image Here</label>

        <div id="drop-zone" class="drop-zone">
            <p id="drop-text">Drag an image file here or click to browse</p>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
        </div>
    </div>

    <div class="form-group">
        <label for="topText">2. Top Text</label>
        <input type="text" id="topText" placeholder="e.g. WHEN THE CODE">
    </div>

    <div class="form-group">
        <label for="bottomText">3. Bottom Text</label>
        <input type="text" id="bottomText" placeholder="e.g. FINALLY WORKS">
    </div>

    <button onclick="generateMeme()">Generate Meme</button>

    <div id="result-area">
        <span class="loading" id="loadingParams">Processing...</span>
        <img id="meme-output" alt="Generated Meme">
    </div>

    <script>document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('drop-zone');
            const imageInput = document.getElementById('imageInput');
            const dropText = document.getElementById('drop-text');

            // --- Core Drag/Drop Events ---

            // 1. Highlight the drop zone
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.add('dragover');
                }, false);
            });

            // 2. Remove highlight
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZone.classList.remove('dragover');
                }, false);
            });

            // 3. Handle the file drop
            dropZone.addEventListener('drop', (e) => {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }, false);

            // 4. Handle click on the drop zone (acts like clicking the hidden input)
            dropZone.addEventListener('click', () => {
                imageInput.click();
            });

            // 5. Handle file selection from click (if user browses)
            imageInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
            });

            // --- File Processing Function ---
            function handleFiles(files) {
                if (files.length > 0) {
                    const file = files[0];

                    // Validate the file type
                    if (!file.type.startsWith('image/')) {
                        alert('Please drop an image file.');
                        dropZone.classList.remove('has-file');
                        dropText.textContent = 'Drag an image file here or click to browse';
                        return;
                    }

                    // Set the file list of the hidden input (crucial for generateMeme to work)
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(file);
                    imageInput.files = dataTransfer.files;

                    // Update UI to show the file has been selected
                    dropZone.classList.add('has-file');
                    dropText.textContent = `File Selected: ${file.name} (Ready for generation)`;
                }
            }
        });
        async function generateMeme() {
            const imageInput = document.getElementById('imageInput');
            const topText = document.getElementById('topText').value;
            const bottomText = document.getElementById('bottomText').value;
            const outputImg = document.getElementById('meme-output');
            const loading = document.getElementById('loadingParams');

            if (imageInput.files.length === 0) {
                alert("Please select an image first!");
                return;
            }

            // 1. Prepare Data
            const formData = new FormData();
            formData.append('image', imageInput.files[0]);
            formData.append('top', topText);
            formData.append('bottom', bottomText);

            // UI Updates
            loading.style.display = 'block';
            outputImg.style.display = 'none';

            try {
                // 2. Send Request to Flask API
                const response = await fetch('/meme', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Server Error");
                }

                // 3. Handle Binary Response (Blob)
                const blob = await response.blob();

                // 4. Create Object URL for the image
                const imageUrl = URL.createObjectURL(blob);

                outputImg.src = imageUrl;
                outputImg.style.display = 'block';
            } catch (error) {
                console.error(error);
                alert("Failed to generate meme. Make sure Flask is running!");
            } finally {
                loading.style.display = 'none';
            }
        }
    </script>
</body>


</html>
